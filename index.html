<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yuan Liu</title>

  <link rel="icon" href="/favicon.ico?v=3" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">

  <style>
    :root{
      --bg:#f3f3f1;
      --fg:#111;
      --muted:#6b6b6b;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family:"Courier New", Courier, monospace;
    }

    body{
      padding:48px 24px 72px;
    }

    .page-home{
      max-width:1700px;
      margin:0 auto;
    }

    .box-row{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:40px;
      flex-wrap:nowrap;
      margin-top:72px;
    }

    .box-wrap{
      width:240px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    /* ===== ASCII BOX ===== */
    .ascii-box{
      position:relative;
      width:240px;
      min-height:220px;
      padding:28px 22px 24px;
      background:transparent;
      color:var(--fg);
      text-decoration:none;
      border:none;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:opacity 0.15s ease, transform 0.15s ease;
      font:inherit;
    }

    button.ascii-box{
      appearance:none;
      -webkit-appearance:none;
      outline:none;
      background:transparent;
    }

    .ascii-box:hover,
    .ascii-box.is-open{
      opacity:0.62;
      transform:translateY(-1px);
    }

    .ascii-art{
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      line-height:1;
      white-space:pre;
      user-select:none;
      pointer-events:none;
    }

    .ascii-top{
      font-size:34px;
      letter-spacing:0;
      margin-bottom:10px;
    }

    .ascii-mid{
      display:flex;
      align-items:stretch;
      justify-content:center;
      gap:10px;
    }

    .ascii-left,
    .ascii-right{
      font-size:44px;
      line-height:1;
      display:flex;
      align-items:stretch;
    }

    .ascii-face{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
    }

    .ascii-num{
      font-size:24px;
      line-height:1.1;
      letter-spacing:0.02em;
      margin-bottom:12px;
      text-transform:uppercase;
    }

    .ascii-label{
      font-size:34px;
      line-height:1.05;
      letter-spacing:0.03em;
      text-transform:uppercase;
      text-align:center;
      word-break:break-word;
    }

    .ascii-bottom{
      font-size:34px;
      letter-spacing:0;
      margin-top:10px;
    }

    /* narrower label cases */
    .label-small .ascii-label{
      font-size:32px;
    }

    .label-tiny .ascii-label{
      font-size:28px;
    }

    .name-box .ascii-label{
      text-transform:none;
      letter-spacing:0.01em;
      font-size:32px;
    }

    .name-box .ascii-num{
      visibility:hidden;
      height:24px;
      margin-bottom:12px;
    }

    /* ===== dropdown ===== */
    .box-sublist{
      width:100%;
      margin-top:8px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      text-align:center;
    }

    .box-sublist[hidden]{
      display:none !important;
    }

    .box-sublist::before{
      content:"|";
      display:block;
      color:var(--muted);
      font-size:24px;
      line-height:1;
      margin-bottom:2px;
    }

    .box-subitem{
      color:var(--fg);
      text-decoration:none;
      font-size:16px;
      line-height:1.3;
      letter-spacing:0.08em;
      text-transform:uppercase;
      transition:opacity 0.15s ease;
    }

    .box-subitem:hover{
      opacity:0.5;
    }

    @media (max-width: 1450px){
      .box-row{
        flex-wrap:wrap;
        gap:28px 30px;
      }
    }

    @media (max-width: 900px){
      body{
        padding:28px 16px 56px;
      }

      .box-row{
        margin-top:36px;
        gap:18px;
      }

      .box-wrap{
        width:min(100%, 300px);
      }

      .ascii-box{
        width:min(100%, 300px);
        min-height:190px;
        padding:22px 14px 18px;
      }

      .ascii-top,
      .ascii-bottom{
        font-size:28px;
      }

      .ascii-left,
      .ascii-right{
        font-size:36px;
      }

      .ascii-num{
        font-size:21px;
        margin-bottom:10px;
      }

      .ascii-label{
        font-size:28px;
      }

      .label-small .ascii-label{
        font-size:26px;
      }

      .label-tiny .ascii-label{
        font-size:23px;
      }

      .name-box .ascii-label{
        font-size:27px;
      }

      .box-subitem{
        font-size:14px;
      }
    }
  </style>
</head>
<body>
  <main class="page-home">

    <section class="box-row" aria-label="Homepage navigation">

      <!-- NAME -->
      <div class="box-wrap">
        <a class="ascii-box name-box" href="index.html" aria-label="Yuan Liu home">
          <div class="ascii-art">
            <div class="ascii-top"> ________ </div>
            <div class="ascii-mid">
              <div class="ascii-left">|</div>
              <div class="ascii-face">
                <div class="ascii-num">[00]</div>
                <div class="ascii-label">Yuan Liu</div>
              </div>
              <div class="ascii-right">|</div>
            </div>
            <div class="ascii-bottom">|________|/</div>
          </div>
        </a>
      </div>

      <!-- PROJECTS -->
      <div class="box-wrap">
        <button class="ascii-box home-toggle label-small"
                type="button"
                data-target="projects-list"
                aria-expanded="false"
                aria-label="Toggle projects list">
          <div class="ascii-art">
            <div class="ascii-top"> ________ </div>
            <div class="ascii-mid">
              <div class="ascii-left">|</div>
              <div class="ascii-face">
                <div class="ascii-num">[01]</div>
                <div class="ascii-label">Projects</div>
              </div>
              <div class="ascii-right">|</div>
            </div>
            <div class="ascii-bottom">|________|/</div>
          </div>
        </button>

        <div id="projects-list" class="box-sublist" hidden>
          <a class="box-subitem" href="projects/boxman/boxman.html">Boxman</a>
          <a class="box-subitem" href="projects/bodily-images/bodily-images.html">Bodily Images</a>
          <a class="box-subitem" href="projects/shadow-of-shadows/shadow-of-shadows.html">Shadow of Shadows</a>
        </div>
      </div>

      <!-- ARCHIVE -->
      <div class="box-wrap">
        <button class="ascii-box home-toggle label-small"
                type="button"
                data-target="archive-list"
                aria-expanded="false"
                aria-label="Toggle archive list">
          <div class="ascii-art">
            <div class="ascii-top"> ________ </div>
            <div class="ascii-mid">
              <div class="ascii-left">|</div>
              <div class="ascii-face">
                <div class="ascii-num">[02]</div>
                <div class="ascii-label">Archive</div>
              </div>
              <div class="ascii-right">|</div>
            </div>
            <div class="ascii-bottom">|________|/</div>
          </div>
        </button>

        <div id="archive-list" class="box-sublist" hidden>
          <a class="box-subitem" href="archive/not-really-pictures/not-really-pictures.html">Not Really Pictures</a>
          <a class="box-subitem" href="archive/mountain-tree/mountain-tree.html">Mountain Tree</a>
          <a class="box-subitem" href="archive/in-columbus/in-columbus.html">In Columbus</a>
          <a class="box-subitem" href="archive/afterlives/afterlives.html">Afterlives</a>
        </div>
      </div>

      <!-- INFO -->
      <div class="box-wrap">
        <a class="ascii-box" href="info.html" aria-label="Info">
          <div class="ascii-art">
            <div class="ascii-top"> ________ </div>
            <div class="ascii-mid">
              <div class="ascii-left">|</div>
              <div class="ascii-face">
                <div class="ascii-num">[03]</div>
                <div class="ascii-label">Info</div>
              </div>
              <div class="ascii-right">|</div>
            </div>
            <div class="ascii-bottom">|________|/</div>
          </div>
        </a>
      </div>

      <!-- CONTACT -->
      <div class="box-wrap">
        <a class="ascii-box label-tiny" href="contact.html" aria-label="Contact">
          <div class="ascii-art">
            <div class="ascii-top"> ________ </div>
            <div class="ascii-mid">
              <div class="ascii-left">|</div>
              <div class="ascii-face">
                <div class="ascii-num">[04]</div>
                <div class="ascii-label">Contact</div>
              </div>
              <div class="ascii-right">|</div>
            </div>
            <div class="ascii-bottom">|________|/</div>
          </div>
        </a>
      </div>

    </section>

  </main>

  <script>
    (function () {
      const toggles = document.querySelectorAll(".home-toggle");
      const panels = ["projects-list", "archive-list"]
        .map(id => document.getElementById(id))
        .filter(Boolean);

      function closeAll(exceptId) {
        toggles.forEach(btn => {
          const id = btn.getAttribute("data-target");
          const panel = document.getElementById(id);
          if (!panel) return;

          if (id !== exceptId) {
            panel.hidden = true;
            btn.setAttribute("aria-expanded", "false");
            btn.classList.remove("is-open");
          }
        });
      }

      panels.forEach(panel => {
        panel.hidden = true;
      });

      toggles.forEach(btn => {
        btn.setAttribute("aria-expanded", "false");
        btn.classList.remove("is-open");
      });

      toggles.forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();

          const id = btn.getAttribute("data-target");
          const panel = document.getElementById(id);
          if (!panel) return;

          const willOpen = panel.hidden === true;
          closeAll(id);

          panel.hidden = !willOpen;
          btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
          btn.classList.toggle("is-open", willOpen);
        });
      });

      document.addEventListener("click", function (e) {
        const inside = e.target.closest(".box-wrap");
        if (!inside) closeAll(null);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeAll(null);
      });
    })();
  </script>
</body>
</html>
