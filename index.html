<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yuan Liu</title>

  <link rel="icon" href="/favicon.ico?v=3" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-home">

    <nav class="home-left" aria-label="Home navigation">
      <a class="home-item home-name" href="index.html">Yuan Liu</a>

      <!-- Projects toggle -->
      <button class="home-item home-toggle"
              type="button"
              data-target="projects-list"
              aria-expanded="false">
        Projects
      </button>
      <div id="projects-list" class="home-sublist is-collapsed" hidden>
        <a class="home-subitem" href="projects/boxman/boxman.html">Boxman</a>
        <a class="home-subitem" href="projects/bodily-images/bodily-images.html">Bodily Images</a>
        <a class="home-subitem" href="projects/shadow-of-shadows/shadow-of-shadows.html">Shadow of Shadows</a>
      </div>

      <!-- Archive toggle -->
      <button class="home-item home-toggle"
              type="button"
              data-target="archive-list"
              aria-expanded="false">
        Archive
      </button>
      <div id="archive-list" class="home-sublist is-collapsed" hidden>
        <a class="home-subitem" href="archive/not-really-pictures/not-really-pictures.html">Not Really Pictures</a>
        <a class="home-subitem" href="archive/mountain-tree/mountain-tree.html">Mountain Tree</a>
        <a class="home-subitem" href="archive/in-columbus/in-columbus.html">In Columbus</a>
        <a class="home-subitem" href="archive/afterlives/afterlives.html">Afterlives</a>
      </div>
    </nav>

    <nav class="home-right" aria-label="Info navigation">
      <a class="home-item" href="info.html">Info</a>
      <a class="home-item" href="contact.html">Contact</a>
    </nav>

    <section class="home-hero" aria-label="Featured image">
      <img class="home-hero-img" src="hero.jpg" alt="Featured work by Yuan Liu" />
    </section>

  </main>

  <script>
    (function () {
      const toggles = document.querySelectorAll(".home-toggle");
      const panels = ["projects-list", "archive-list"].map(id => document.getElementById(id)).filter(Boolean);

      // ✅ 强制：初始加载全部收起（防止被别的代码/缓存影响）
      panels.forEach(p => {
        p.hidden = true;
        p.classList.add("is-collapsed");
      });
      toggles.forEach(b => b.setAttribute("aria-expanded", "false"));

      function closeAll(exceptId) {
        toggles.forEach(btn => {
          const id = btn.getAttribute("data-target");
          const panel = document.getElementById(id);
          if (!panel) return;
          if (id !== exceptId) {
            panel.hidden = true;
            panel.classList.add("is-collapsed");
            btn.setAttribute("aria-expanded", "false");
          }
        });
      }

      toggles.forEach(btn => {
        btn.addEventListener("click", (e) => {
          e.stopPropagation();
          const id = btn.getAttribute("data-target");
          const panel = document.getElementById(id);
          if (!panel) return;

          const willOpen = panel.hidden === true; // 当前关 -> 打开
          closeAll(id);

          panel.hidden = !willOpen;
          panel.classList.toggle("is-collapsed", !willOpen);
          btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
        });
      });

      // 点击空白处收起
      document.addEventListener("click", (e) => {
        const insideLeftNav = e.target.closest(".home-left");
        if (!insideLeftNav) closeAll(null);
      });

      // Esc 收起
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeAll(null);
      });
    })();
  </script>
</body>
</html>
