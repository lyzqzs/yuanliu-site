<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yuan Liu</title>

  <link rel="icon" href="/favicon.ico?v=3" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page page-home">

    <nav class="home-left" aria-label="Home navigation">
      <a class="home-item home-name" href="index.html">Yuan Liu</a>

      <!-- IMPORTANT: must be a BUTTON, not a link -->
<button
  class="home-item home-toggle"
  type="button"
  aria-expanded="false"
  aria-controls="home-projects"
>
  Projects
</button>

<div id="home-projects" class="home-dropdown" hidden>
  <a class="home-subitem" href="projects/boxman/boxman.html">Boxman</a>
  <a class="home-subitem" href="projects/bodily-images/bodily-images.html">Bodily Images</a>
  <a class="home-subitem" href="projects/shadow-of-shadows/shadow-of-shadows.html">Shadow of Shadows</a>
</div>

      <a class="home-item" href="archive.html">Archive</a>
    </nav>

    <nav class="home-right" aria-label="Info navigation">
      <a class="home-item" href="info.html">Info</a>
      <a class="home-item" href="contact.html">Contact</a>
    </nav>

    <section class="home-hero" aria-label="Featured image">
      <img class="home-hero-img" src="hero.jpg" alt="Featured work by Yuan Liu" />
    </section>

  </main>

  <script>
    (function () {
      const btn = document.querySelector(".home-toggle");
      const panel = document.getElementById("home-projects");
      if (!btn || !panel) return;

      btn.addEventListener("click", () => {
        const isOpen = btn.getAttribute("aria-expanded") === "true";
        btn.setAttribute("aria-expanded", String(!isOpen));
        panel.hidden = isOpen;
      });

      document.addEventListener("click", (e) => {
        const isOpen = btn.getAttribute("aria-expanded") === "true";
        if (!isOpen) return;
        if (btn.contains(e.target) || panel.contains(e.target)) return;
        btn.setAttribute("aria-expanded", "false");
        panel.hidden = true;
      });

      document.addEventListener("keydown", (e) => {
        if (e.key !== "Escape") return;
        const isOpen = btn.getAttribute("aria-expanded") === "true";
        if (!isOpen) return;
        btn.setAttribute("aria-expanded", "false");
        panel.hidden = true;
      });
    })();
  </script>
</body>
</html>
