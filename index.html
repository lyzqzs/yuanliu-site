<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Yuan Liu</title>

  <link rel="icon" href="/favicon.ico?v=3" sizes="any">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3">

  <style>
    :root{
      --bg:#f3f3f1;
      --fg:#111;
      --muted:#6b6b6b;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      min-height:100%;
      background:var(--bg);
      color:var(--fg);
      font-family:"Courier New", Courier, monospace;
    }

    body{
      padding:56px 20px 72px;
    }

    .page-home{
      max-width:1600px;
      margin:0 auto;
    }

    /* one centered row on desktop */
    .box-row{
      display:flex;
      justify-content:center;
      align-items:flex-start;
      gap:18px;
      flex-wrap:nowrap;
      margin-top:84px;
      overflow-x:auto;
      overflow-y:visible;
      padding-bottom:8px;
    }

    .box-row::-webkit-scrollbar{
      height:8px;
    }

    .box-row::-webkit-scrollbar-thumb{
      background:rgba(0,0,0,0.18);
    }

    .box-wrap{
      flex:0 0 auto;
      width:172px;
      display:flex;
      flex-direction:column;
      align-items:center;
    }

    .ascii-box{
      display:block;
      width:172px;
      padding:0;
      margin:0;
      border:none;
      background:transparent;
      color:var(--fg);
      text-decoration:none;
      cursor:pointer;
      transition:opacity 0.15s ease, transform 0.15s ease;
      font:inherit;
    }

    button.ascii-box{
      appearance:none;
      -webkit-appearance:none;
      outline:none;
    }

    .ascii-box:hover,
    .ascii-box.is-open{
      opacity:0.58;
      transform:translateY(-1px);
    }

    .ascii-pre{
      margin:0;
      white-space:pre;
      font-family:"Courier New", Courier, monospace;
      font-size:16px;
      line-height:1.05;
      letter-spacing:0;
      text-align:left;
      user-select:none;
      pointer-events:none;
    }

    .box-sublist{
      width:100%;
      margin-top:6px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:10px;
      text-align:center;
    }

    .box-sublist[hidden]{
      display:none !important;
    }

    .box-sublist::before{
      content:"|";
      display:block;
      color:var(--muted);
      font-size:18px;
      line-height:1;
      margin-bottom:0;
    }

    .box-subitem{
      color:var(--fg);
      text-decoration:none;
      font-size:14px;
      line-height:1.25;
      letter-spacing:0.08em;
      text-transform:uppercase;
      transition:opacity 0.15s ease;
    }

    .box-subitem:hover{
      opacity:0.5;
    }

    @media (max-width: 900px){
      body{
        padding:28px 14px 56px;
      }

      .box-row{
        justify-content:flex-start;
        margin-top:44px;
        gap:12px;
      }

      .box-wrap{
        width:150px;
      }

      .ascii-box{
        width:150px;
      }

      .ascii-pre{
        font-size:14px;
      }

      .box-subitem{
        font-size:13px;
      }
    }
  </style>
</head>
<body>
  <main class="page-home">

    <section class="box-row" aria-label="Homepage navigation">

      <!-- [00] YUAN LIU -->
      <div class="box-wrap">
        <a class="ascii-box" href="index.html" aria-label="Yuan Liu home">
<pre class="ascii-pre">  ________
 /______ /|
 | [00]  | |
 |YUAN   | |
 | LIU   |/
</pre>
        </a>
      </div>

      <!-- [01] PROJECTS -->
      <div class="box-wrap">
        <button class="ascii-box home-toggle"
                type="button"
                data-target="projects-list"
                aria-expanded="false"
                aria-label="Toggle projects list">
<pre class="ascii-pre">  ________
 /______ /|
 | [01]  | |
 |PROJECTS| |
 |________|/
</pre>
        </button>

        <div id="projects-list" class="box-sublist" hidden>
          <a class="box-subitem" href="projects/boxman/boxman.html">Boxman</a>
          <a class="box-subitem" href="projects/bodily-images/bodily-images.html">Bodily Images</a>
          <a class="box-subitem" href="projects/shadow-of-shadows/shadow-of-shadows.html">Shadow of Shadows</a>
        </div>
      </div>

      <!-- [02] ARCHIVE -->
      <div class="box-wrap">
        <button class="ascii-box home-toggle"
                type="button"
                data-target="archive-list"
                aria-expanded="false"
                aria-label="Toggle archive list">
<pre class="ascii-pre">  ________
 /______ /|
 | [02]  | |
 |ARCHIVE| |
 |________|/
</pre>
        </button>

        <div id="archive-list" class="box-sublist" hidden>
          <a class="box-subitem" href="archive/not-really-pictures/not-really-pictures.html">Not Really Pictures</a>
          <a class="box-subitem" href="archive/mountain-tree/mountain-tree.html">Mountain Tree</a>
          <a class="box-subitem" href="archive/in-columbus/in-columbus.html">In Columbus</a>
          <a class="box-subitem" href="archive/afterlives/afterlives.html">Afterlives</a>
        </div>
      </div>

      <!-- [03] INFO -->
      <div class="box-wrap">
        <a class="ascii-box" href="info.html" aria-label="Info">
<pre class="ascii-pre">  ________
 /______ /|
 | [03]  | |
 |  INFO  | |
 |________|/
</pre>
        </a>
      </div>

      <!-- [04] CONTACT -->
      <div class="box-wrap">
        <a class="ascii-box" href="contact.html" aria-label="Contact">
<pre class="ascii-pre">  ________
 /______ /|
 | [04]  | |
 |CONTACT | |
 |________|/
</pre>
        </a>
      </div>

    </section>

  </main>

  <script>
    (function () {
      const toggles = document.querySelectorAll(".home-toggle");
      const panels = ["projects-list", "archive-list"]
        .map(id => document.getElementById(id))
        .filter(Boolean);

      function closeAll(exceptId) {
        toggles.forEach(btn => {
          const id = btn.getAttribute("data-target");
          const panel = document.getElementById(id);
          if (!panel) return;

          if (id !== exceptId) {
            panel.hidden = true;
            btn.setAttribute("aria-expanded", "false");
            btn.classList.remove("is-open");
          }
        });
      }

      panels.forEach(panel => {
        panel.hidden = true;
      });

      toggles.forEach(btn => {
        btn.setAttribute("aria-expanded", "false");
        btn.classList.remove("is-open");
      });

      toggles.forEach(btn => {
        btn.addEventListener("click", function (e) {
          e.stopPropagation();

          const id = btn.getAttribute("data-target");
          const panel = document.getElementById(id);
          if (!panel) return;

          const willOpen = panel.hidden === true;
          closeAll(id);

          panel.hidden = !willOpen;
          btn.setAttribute("aria-expanded", willOpen ? "true" : "false");
          btn.classList.toggle("is-open", willOpen);
        });
      });

      document.addEventListener("click", function (e) {
        const inside = e.target.closest(".box-wrap");
        if (!inside) closeAll(null);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeAll(null);
      });
    })();
  </script>
</body>
</html>
