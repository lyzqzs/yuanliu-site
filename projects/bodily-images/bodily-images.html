<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bodily Images — Yuan Liu</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>

<body class="page-work">

  <nav class="top-nav">
    <a href="../../index.html">home</a>
  </nav>

  <main class="work-wrap">
    <figure class="work-figure">
      <img
        id="workImage"
        class="work-img"
        src="bodily-01.JPG"
        alt="Bodily Images documentation"
        loading="eager"
      />
    </figure>

    <div class="work-caption">
      <div class="work-title">Bodily Images</div>
      <div class="work-meta">
        They Have No Names!<br>
        July 5 – July 24, 2025<br>
        Three Shadows Photography Art Center, Beijing
      </div>
    </div>
  </main>

  <script>
    const images = [
      "bodily-01.JPG",
      "bodily-02.JPG",
      "bodily-03.JPG",
      "bodily-04.JPG",
      "bodily-05.JPG",
      "bodily-06.JPG",
      "bodily-07.JPG"
    ];

    let idx = 0;
    const imgEl = document.getElementById("workImage");

    function show(i){
      idx = (i + images.length) % images.length;
      imgEl.src = images[idx];
    }

    imgEl.addEventListener("click", () => show(idx + 1));

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") show(idx + 1);
      if (e.key === "ArrowLeft") show(idx - 1);
    });
  </script>

</body>
</html>
