<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>There Was a Box Man — Yuan Liu</title>
  <link rel="stylesheet" href="../../styles.css" />
</head>

<body class="page-work">

  <nav class="top-nav">
    <a href="../../index.html">home</a>
  </nav>

  <main class="work-wrap">
    <div class="work-stage">
      <div class="work-track" id="workTrack">

        <!-- image panel -->
        <section class="work-panel image-panel">
          <figure class="work-figure">
            <img
              id="projectImage"
              class="work-img"
              src="boxman-01.JPG"
              alt="There Was a Box Man"
            />
          </figure>
        </section>

        <!-- video panel -->
        <section class="work-panel video-panel" id="videoPanel">
          <div class="video-frame-wrap">
            <iframe
              src="https://player.vimeo.com/video/1169474932"
              class="video-frame"
              frameborder="0"
              allow="autoplay; fullscreen; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>
        </section>

      </div>
    </div>

    <div class="work-nav-hint">
      <button id="toImage" class="nav-hint-btn is-active" type="button">image</button>
      <button id="toVideo" class="nav-hint-btn" type="button">video</button>
    </div>

    <figcaption class="work-caption">
      <div class="work-title">There Was a Box Man</div>
      <div class="work-meta">
        Jan 31 – Feb 7, 2026<br>
        California Institute of the Arts
      </div>
    </figcaption>
  </main>

  <script>
    const images = [
      "boxman-01.JPG",
      "boxman-02.JPG",
      "boxman-03.JPG",
      "boxman-04.JPG",
      "boxman-05.JPG",
      "boxman-06.JPG",
      "boxman-07.JPG",
      "boxman-08.JPG",
      "boxman-09.JPG",
      "boxman-10.JPG",
      "boxman-11.JPG",
      "boxman-12.JPG",
    ];

    let index = 0;
    const img = document.getElementById("projectImage");
    const track = document.getElementById("workTrack");
    const toImage = document.getElementById("toImage");
    const toVideo = document.getElementById("toVideo");

    function show(i){
      index = (i + images.length) % images.length;
      img.src = images[index];
    }

    function goImage() {
      track.classList.remove("show-video");
      toImage.classList.add("is-active");
      toVideo.classList.remove("is-active");
    }

    function goVideo() {
      track.classList.add("show-video");
      toVideo.classList.add("is-active");
      toImage.classList.remove("is-active");
    }

    img.addEventListener("click", () => show(index + 1));

    toImage.addEventListener("click", goImage);
    toVideo.addEventListener("click", goVideo);

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight") {
        if (track.classList.contains("show-video")) {
          return;
        }
        goVideo();
      }

      if (e.key === "ArrowLeft") {
        if (track.classList.contains("show-video")) {
          goImage();
        } else {
          show(index - 1);
        }
      }

      if (e.key === " " || e.key === "Enter") {
        if (document.activeElement === toVideo) goVideo();
        if (document.activeElement === toImage) goImage();
      }
    });

    // 点击视频区域时也切过去
    document.getElementById("videoPanel").addEventListener("click", goVideo);
  </script>

</body>
</html>
